<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โรงเรียนวังทองพิทยาคม</title>

    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* --- ตั้งค่าตัวแปรสี --- */
        :root {
            --primary-green: #1B5E20;
            /* เขียวเข้มแบบโรงเรียน */
            --secondary-green: #4CAF50;
            /* เขียวสว่างสำหรับปุ่ม/Highlight */
            --bg-white: #ffffff;
            --bg-light: #f4f9f4;
            /* สีพื้นหลังขาวอมเขียวจางๆ */
            --text-dark: #333333;
            --text-light: #ffffff;
        }

        /* --- Reset & Base Styles --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            line-height: 1.6;
            background-color: var(--bg-light);
            color: var(--text-dark);
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        ul {
            list-style: none;
        }

        /* --- Header & Navigation --- */
        header {
            background-color: var(--primary-green);
            color: var(--text-light);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: var(--text-light);
            font-weight: 400;
            transition: 0.3s;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .nav-links a:hover {
            background-color: var(--secondary-green);
        }

        /* Hamburger Menu (Mobile) */
        .hamburger {
            display: none;
            cursor: pointer;
            font-size: 1.5rem;
        }

        /* --- Hero Section (Banner) --- */
        .hero {
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), url('images/cover.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            /* Full screen height */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--text-light);
            padding: 20px;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            /* Darker overlay for readability */
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            max-width: 800px;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .hero p {
            font-size: 1.4rem;
            margin-bottom: 2rem;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }

        /* --- Footer --- */
        footer {
            background-color: var(--primary-green);
            height: 10px;
            /* Minimal footer strip */
        }

        /* --- Mobile Responsive --- */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }

            .about-content {
                flex-direction: column-reverse;
                text-align: center;
            }

            .nav-links {
                position: fixed;
                top: 60px;
                right: -100%;
                width: 70%;
                height: 100vh;
                background-color: var(--primary-green);
                flex-direction: column;
                align-items: center;
                padding-top: 50px;
                transition: 0.4s;
                z-index: 1001;
                /* Ensure on top */
            }

            .nav-links.active {
                right: 0;
            }

            .hamburger {
                display: block;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="container">
            <div class="logo">
                🏫 โรงเรียนวังทองพิทยาคม
            </div>
            <nav>
                <ul class="nav-links" id="navLinks">
                    <li><a href="#home">หน้าแรก</a></li>
                    <li><a href="history.html">เกี่ยวกับเรา</a></li>
                    <li><a href="subjects.html">วิชา</a></li>
                    <li><a href="http://www.wtp.ac.th/mainpage" target="_blank">ติดต่อเรา</a></li>
                </ul>
            </nav>
            <div class="hamburger" id="hamburger">
                ☰
            </div>
        </div>
    </header>

    <section id="home" class="hero">
        <div class="hero-content">
            <h1>ยินดีต้อนรับสู่โรงเรียนวังทองพิทยาคม</h1>
            <p>มุ่งมั่นการจัดการศึกษาให้มีคุณภาพตามเกณฑ์มาตรฐานสากล</p>
            <a href="history.html" class="btn">รู้จักโรงเรียนเราให้มากขึ้น</a>
        </div>
    </section>










    <script>
        // ฟังก์ชัน Toggle เมนูสำหรับมือถือ
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');

        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        // ฟังก์ชันทักทายตามช่วงเวลา
        window.addEventListener('load', () => {
            const hour = new Date().getHours();
            let greeting;

            if (hour < 12) {
                greeting = "สวัสดีตอนเช้า";
            } else if (hour < 18) {
                greeting = "สวัสดีตอนบ่าย";
            } else {
                greeting = "สวัสดีตอนเย็น";
            }

            console.log(`${greeting}! ยินดีต้อนรับสู่เว็บไซต์โรงเรียนวังทองพิทยาคม`);
            // คุณสามารถเปลี่ยน console.log เป็น alert(greeting) ถ้าต้องการให้เด้งแจ้งเตือน
        });
    </script>
</body>

</html>
